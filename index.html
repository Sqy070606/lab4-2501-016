/* 轮播容器 */
.carousel {
    position: relative;

}

.carousel-item {

    height: 100%;
    top: 0;
    left: 0;
}

.carousel-item img {
    width: 100%;
    height: 100%;

}

@keyframes slideVertical {
    0%    { transform: translateY(100%); opacity: 0; }
    10%   { transform: translateY(0);     opacity: 1; }
    16.66%{ transform: translateY(0);     opacity: 1; }
    26.66%{ transform: translateY(-100%); opacity: 0; }
    100%  { transform: translateY(-100%); opacity: 0; }
}

.carousel-item {
    animation: slideVertical 6s linear infinite;
}
.carousel-item:nth-child(1) { animation-delay: 0s;    }
.carousel-item:nth-child(2) { animation-delay: 1s;    }
.carousel-item:nth-child(3) { animation-delay: 2s;    }
.carousel-item:nth-child(4) { animation-delay: 3s;    }
.carousel-item:nth-child(5) { animation-delay: 4s;    }

<script>
function closeBox(){
    document.getElementById('loginBox').style.display='none';
    document.getElementById('registerBox').style.display='none';
}    
function showLogin(){
    document.getElementById('loginBox').style.display='block';
    document.getElementById('registerBox').style.display='none';
}
function switchBox() {
    let login = document.getElementById('loginBox');
    let register = document.getElementById('registerBox');
    
    if (login.style.display === 'none') {
        login.style.display = 'block';
        register.style.display = 'none';
    } else {
        login.style.display = 'none';
        register.style.display = 'block';
    }
}
</script>
